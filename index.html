<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guardare Signup Widget Test</title>

    <style>
      :root {
        --bg: #f3f4f6;
        --text: #111827;
        --subtext: #6b7280;
        --card: #ffffff;
      }

      .dark {
        --bg: #1f2937;
        --text: #f3f4f6;
        --subtext: #9ca3af;
        --card: #374151;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        transition:
          0.25s ease background-color,
          0.25s ease color;
      }

      .container {
        background: var(--card);
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 750px;
        margin-top: 2rem;
        transition: 0.25s ease background-color;
      }

      h1 {
        text-align: center;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin: 2rem 0;
      }

      label {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.875rem;
        color: var(--subtext);
      }

      select,
      input {
        padding: 0.5rem 0.75rem;
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        font-size: 1rem;
        box-sizing: border-box;
        background: var(--card);
        color: var(--text);
      }

      button {
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 0.5rem;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
      }

      /* ── Free Tools tabs ── */
      .free-tools-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--subtext);
        margin-bottom: 0.5rem;
      }

      .tab-bar {
        display: flex;
        gap: 0;
        border-bottom: 2px solid #e5e7eb;
        margin-bottom: 1.5rem;
      }

      .tab-btn {
        padding: 0.5rem 1.25rem;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--subtext);
        cursor: pointer;
        border-radius: 0;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .tab-btn.active {
        color: #2563eb;
        border-bottom-color: #2563eb;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Guardare Signup Widget Tester</h1>

      <!-- Dark Mode Toggle -->
      <div style="text-align: center">
        <button onclick="toggleDarkMode()">Toggle Light/Dark Mode</button>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div>
          <label>Select Environment</label>
          <select id="envSelect" onchange="updateFields()">
            <option value="http://localhost:4173">localhost:4173</option>
            <option value="https://dev.guardare.com">dev.guardare.com</option>
            <option value="https://preview.guardare.com">preview.guardare.com</option>
            <option value="https://portal.guardare.com">portal.guardare.com</option>
          </select>
        </div>

        <div>
          <label>Return URL</label>
          <input id="returnUrl" />
        </div>
      </div>

      <hr style="margin: 0 0 1.5rem 0; opacity: 0.3" />

      <!-- Free Tools section -->
      <p class="free-tools-label">Free Tools</p>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('gem', this)">GEM</button>
        <button class="tab-btn" onclick="switchTab('gds', this)">GDS</button>
      </div>

      <!-- GEM Tab -->
      <div id="tab-gem" class="tab-panel active">
        <button onclick="loadGemWidget()" style="width: 100%; margin-bottom: 1.5rem">Load JS Widget</button>
        <div id="guardare-signup-container"></div>
      </div>

      <!-- GDS Tab -->
      <div id="tab-gds" class="tab-panel">
        <button onclick="loadGdsWidget()" style="width: 100%; margin-bottom: 1.5rem">Load GDS Widget</button>
        <div id="guardare-gds-container"></div>
      </div>
    </div>

    <script>
      // 🌙 Toggle Dark/Light Mode
      function toggleDarkMode() {
        document.body.classList.toggle("dark");
      }

      // Tab switching
      function switchTab(tab, btn) {
        document.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");
        btn.classList.add("active");
      }

      // Update fields based on selected environment
      function updateFields() {
        const base = document.getElementById("envSelect").value;
        document.getElementById("returnUrl").value = `${base}/set-password/`;
        document.getElementById("signupIframe").src = `${base}/embed/sign-up`;
      }

      // Load GEM JS widget dynamically
      function loadGemWidget() {
        const base = document.getElementById("envSelect").value;
        const ret = document.getElementById("returnUrl").value.trim();

        const existing = document.getElementById("guardare-widget-gem");
        if (existing) existing.remove();

        document.getElementById("guardare-signup-container").innerHTML = "";

        const script = document.createElement("script");
        script.id = "guardare-widget-gem";
        script.src = `${base}/guardare-signup.js`;
        script.setAttribute("data-target", "#guardare-signup-container");
        script.setAttribute("data-return-url", ret);

        document.body.appendChild(script);
        console.log("GEM Widget Loaded:", script.src);
      }

      // Load GDS widget dynamically
      function loadGdsWidget() {
        const base = document.getElementById("envSelect").value;
        const ret = document.getElementById("returnUrl").value.trim();

        const existing = document.getElementById("guardare-widget-gds");
        if (existing) existing.remove();

        document.getElementById("guardare-gds-container").innerHTML = "";

        const script = document.createElement("script");
        script.id = "guardare-widget-gds";
        script.src = `${base}/guardare-signup.js`;
        script.setAttribute("data-endpoint", "/api/v1/Company/free-gds");
        script.setAttribute("data-target", "#guardare-gds-container");
        script.setAttribute("data-return-url", ret);

        document.body.appendChild(script);
        console.log("GDS Widget Loaded:", script.src);
      }

      // Initialize defaults
      updateFields();
    </script>
  </body>
</html>
